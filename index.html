<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Olukolade Kaka">
        <meta name="description" content="My first web page">
        <meta name="keywords" content="html, css, web development, javascript">
        <link rel="icon" href="./asset/media/favicon.png" type="image/x.icon">
        <title>FAKEBOOK</title>
        <link rel="stylesheet" href="./asset/styles/styles.css" media="all">
        <script type="module" src="./asset/script/script.js"></script>
    </head>
    <body>
        <div class="container-flex">
            <header>
                <div class="logo">Fakebook</div>
                    <nav>
                        <ul>
                            <li><a href="#">Friends</a></li>
                            <li><a href="#">Pages</a></li>
                            <li><a href="#">Groups</a></li>
                            <li><a href="#">My ads</a></li>
                            <li><a href="#">Settings</a></li>
                        </ul>
                    </nav>
                    <img src="./asset/media/My Profile Picture.jpeg" class="profileIcon" id="profileBtn">
            </header>
        </div>
        <main>
            <div class="container">
                <div class="postForm">
                    <textarea id="postArea" placeholder="What's new, Kay?"></textarea>
                    <div class="postCntrl">
                        <div class="fileIndicator">
                            <label for="imgUpload"><i class="fa-regular fa-camera"></i></label>
                            <input type="file" id="imgUpload" hidden>
                            <span id="fileName"></span>
                        </div>
                        <button id="postBtn">Post</button>
                    </div>
                </div>
                <section id="postsContainer"></section>
            </div>
        </main>
    </body>
</html>
